syntax = "proto3";

package sistema;

option java_package = "sistema";
option java_outer_classname = "Mensagens";


message Envelope {
    string funcao = 1;
    double timestamp = 2;
    string username = 3;
    string parametro = 4;
    string mensagem = 5;
    int64 relogio_logico = 6;
}

message Resposta {
    string status = 1;
    string mensagem = 2;
    double timestamp = 3;
    repeated string canais = 4;
    int64 relogio_logico = 5;
}

message Publicacao {
    string canal = 1;
    string username = 2;
    string mensagem = 3;
    double timestamp_envio = 4;
    double timestamp_recebimento = 5;
    int64 relogio_logico = 6;
}

message ReqReferencia {
    string funcao = 1;   
    string nome = 2;
    int64 relogio_logico = 3;
}

message ResReferencia {
    string status = 1;
    int32 rank = 2;
    double timestamp = 3;
    repeated ServidorInfo servidores = 4;
    int64 relogio_logico = 5;
}

message ServidorInfo {
    string nome = 1;
    int32 rank = 2;
}

// Mantido apenas para eleicao e sync S2S (nao mais para replicacao)
message ReqS2S {
    string funcao = 1;   
    int64 relogio_logico = 2;
    string canal = 3;
    string username = 4;
    string mensagem = 5;
    double timestamp_envio = 6;
    double timestamp_recebimento = 7;
    string snapshot_json = 8;
}

message ResS2S {
    bool ok = 1;
    int64 timestamp = 2; 
    int64 relogio_logico = 3;
    string snapshot_json = 4;
}

// NOVO: evento de replicacao passiva por push via topico "replicas"
message ReplicaEvento {
    string servidor_origem = 1;
    string tipo_evento = 2;   // "login" | "canal" | "mensagem"
    string username = 3;
    string canal = 4;
    string mensagem = 5;
    double timestamp = 6;
    int64 relogio_logico = 7;
}
