syntax = "proto3";

package sistema;

option java_package = "sistema";
option java_outer_classname = "Mensagens";

message Envelope {
    string funcao = 1;      
    double timestamp = 2;   
    string username = 3;
    string parametro = 4;   
    string mensagem = 5;   
}

message Resposta {
    string status = 1;      
    string mensagem = 2;
    double timestamp = 3;   
    repeated string canais = 4;
}

message Publicacao {
    string canal = 1;
    string username = 2;
    string mensagem = 3;
    double timestamp_envio = 4;
    double timestamp_recebimento = 5;
}
