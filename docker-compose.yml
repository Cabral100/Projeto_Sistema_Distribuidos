services:

  broker:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - "5555:5555"
      - "5556:5556"

  servidor:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    volumes:
      - ./servidor.py:/app/main.py
      - ./data:/data
    depends_on:
      - broker
    deploy:
      replicas: 2

  cliente:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      - BROKER_URL=tcp://broker:5555
      - BOT_NAME=bot
    depends_on:
      - servidor
    deploy:
      replicas: 2
