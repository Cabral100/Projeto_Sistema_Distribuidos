services:
  broker:
    build: .
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - "5555:5555"
      - "5556:5556"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\",5555)); s.close()'"]
      interval: 1s
      timeout: 2s
      retries: 5

  servidor1:
    build: .
    volumes:
      - ./servidor.py:/app/main.py
      - ./data/srv1:/data
    environment:
      - SERVER_NAME=servidor1
    depends_on:
      broker:
        condition: service_healthy

  servidor2:
    build: .
    volumes:
      - ./servidor.py:/app/main.py
      - ./data/srv2:/data
    environment:
      - SERVER_NAME=servidor2
    depends_on:
      broker:
        condition: service_healthy

  cliente1:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      - BROKER_URL=tcp://broker:5555
      - BOT_NAME=lucas
    depends_on:
      broker:
        condition: service_healthy

  cliente2:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      - BROKER_URL=tcp://broker:5555
      - BOT_NAME=maria
    depends_on:
      broker:
        condition: service_healthy