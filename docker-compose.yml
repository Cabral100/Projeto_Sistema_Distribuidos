services:

  broker:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - "5555:5555"
      - "5556:5556"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',5555)); s.close()\""]
      interval: 3s
      timeout: 5s
      retries: 10

  servidor:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    volumes:
      - ./servidor.py:/app/main.py
      - ./data:/data
    depends_on:
      broker:
        condition: service_healthy
    deploy:
      replicas: 2

  cliente1:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      - BROKER_URL=tcp://broker:5555
      - BOT_NAME=lucas        # <-- nome válido
    depends_on:
      broker:
        condition: service_healthy

  cliente2:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      - BROKER_URL=tcp://broker:5555
      - BOT_NAME=maria        # <-- nome válido e diferente
    depends_on:
      broker:
        condition: service_healthy

