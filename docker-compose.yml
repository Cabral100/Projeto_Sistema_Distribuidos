services:
  broker:
    build: .
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - "5555:5555"
      - "5556:5556"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\",5555)); s.close()'"]
      interval: 1s
      timeout: 2s
      retries: 5

  proxy_pubsub:
    build: .
    container_name: proxy_pubsub
    volumes:
      - ./proxy_pubsub.py:/app/main.py
    ports:
      - "5557:5557"
      - "5558:5558"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\",5558)); s.close()'"]
      interval: 1s
      timeout: 2s
      retries: 5

  referencia:
    build: .
    container_name: referencia
    volumes:
      - ./referencia.py:/app/main.py
    ports:
      - "5559:5559"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.connect((\"localhost\",5559)); s.close()'"]
      interval: 1s
      timeout: 2s
      retries: 10

  servidor1:
    build: .
    volumes:
      - ./servidor.py:/app/main.py
      - ./data/srv1:/data
    environment:
      - SERVER_NAME=servidor1
      - REFERENCIA_URL=tcp://referencia:5559
    depends_on:
      broker:
        condition: service_healthy
      proxy_pubsub:
        condition: service_healthy
      referencia:
        condition: service_healthy

  servidor2:
    build: .
    volumes:
      - ./servidor.py:/app/main.py
      - ./data/srv2:/data
    environment:
      - SERVER_NAME=servidor2
      - REFERENCIA_URL=tcp://referencia:5559
    depends_on:
      broker:
        condition: service_healthy
      proxy_pubsub:
        condition: service_healthy
      referencia:
        condition: service_healthy

  cliente1:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      - BROKER_URL=tcp://broker:5555
      - PUBSUB_URL=tcp://proxy_pubsub:5558
      - BOT_NAME=lucas
    depends_on:
      broker:
        condition: service_healthy
      proxy_pubsub:
        condition: service_healthy

  cliente2:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      - BROKER_URL=tcp://broker:5555
      - PUBSUB_URL=tcp://proxy_pubsub:5558
      - BOT_NAME=maria
    depends_on:
      broker:
        condition: service_healthy
      proxy_pubsub:
        condition: service_healthy
